<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Holi Surprise for You 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        /* Page 1 Styles - Simple and Beautiful */
        #page1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            background: radial-gradient(circle at 20% 50%, #ff9a9e, #fad0c4, #fbc2eb);
            text-align: center;
            padding: 20px;
        }

        #page1.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* Simple floating hearts background */
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 40px;
            animation: floatUp 8s infinite linear;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 1rem;
            font-family: 'Dancing Script', cursive;
            letter-spacing: 2px;
            animation: fadeInDown 1.2s ease;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subhead {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 2.5rem;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeInUp 1.2s ease 0.2s both;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .open-btn {
            padding: 18px 45px;
            font-size: 1.3rem;
            background: white;
            border: none;
            border-radius: 50px;
            color: #ff6b6b;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: pulse 2s infinite, fadeInScale 1.2s ease 0.4s both;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }

        .open-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: #fff5f5;
        }

        /* Page 2 Styles */
        #page2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #page2.visible {
            opacity: 1;
            visibility: visible;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Bigger Envelope */
        .envelope-container {
            position: relative;
            width: 600px;
            height: 420px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.3));
        }

        .envelope-container.opened {
            transform: scale(0.7) translateY(-80px);
            opacity: 0.2;
            pointer-events: none;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fdf0e0;
            border-radius: 20px;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            border: 4px solid rgba(255, 215, 215, 0.6);
            overflow: hidden;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            border-left: 300px solid transparent;
            border-right: 300px solid transparent;
            border-top: 180px solid #ffe4ce;
            border-radius: 20px 20px 0 0;
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 3;
        }

        .envelope-flap.open {
            transform: rotateX(180deg);
        }

        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85%;
            background: #fdf0e0;
            border-radius: 0 0 20px 20px;
            z-index: 1;
            overflow: hidden;
        }

        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            box-shadow: 0 5px 25px rgba(255, 107, 107, 0.6);
            border: 4px solid white;
            animation: sealGlow 2s infinite;
        }

        @keyframes sealGlow {
            0%, 100% { box-shadow: 0 5px 25px rgba(255,107,107,0.6); }
            50% { box-shadow: 0 5px 45px rgba(255,107,107,0.9); }
        }

        .seal i {
            color: white;
            font-size: 50px;
        }

        .hint-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.3rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            animation: bounceHint 2s infinite;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            padding: 8px 25px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.5);
        }

        @keyframes bounceHint {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        /* Letter Styles */
        .letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-5deg);
            width: 550px;
            background: #fff9f0;
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 50px 90px rgba(0, 0, 0, 0.4);
            z-index: 20;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid #ffd7d7;
            pointer-events: none;
        }

        .letter.visible {
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            opacity: 1;
            pointer-events: all;
        }

        .letter-content {
            position: relative;
            width: 100%;
        }

        .letter h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff6b6b;
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .letter textarea {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            font-size: 1.2rem;
            border: 2px solid #ffd7d7;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            font-family: 'Poppins', sans-serif;
            resize: vertical;
            margin: 20px 0;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
            line-height: 1.6;
        }

        .letter textarea:focus {
            border-color: #ff8e8e;
            box-shadow: 0 0 20px rgba(255, 142, 142, 0.3);
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #ff6b6b;
            text-align: right;
            margin-top: 10px;
        }

        .holi-greeting {
            text-align: center;
            font-size: 1.4rem;
            color: #ff8e8e;
            margin: 15px 0;
            font-weight: 400;
            font-family: 'Dancing Script', cursive;
        }

        /* Letter Action Buttons */
        .letter-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .close-btn {
            padding: 12px 30px;
            background: #ff6b6b;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .rewatch-btn {
            padding: 12px 30px;
            background: #4a90e2;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .close-btn:hover, .rewatch-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .close-btn:hover {
            background: #ff5252;
        }

        .rewatch-btn:hover {
            background: #357abd;
        }

        /* Color Splash Particles */
        .splash-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .splash-particle {
            position: absolute;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            filter: blur(3px);
            animation: splash 2.2s forwards;
            box-shadow: 0 0 25px currentColor;
        }

        @keyframes splash {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 1;
            }
            40% {
                transform: scale(2.5) translate(var(--tx), var(--ty));
                opacity: 0.9;
            }
            80% {
                transform: scale(1.5) translate(var(--tx-mid), var(--ty-mid));
                opacity: 0.4;
            }
            100% {
                transform: scale(0.3) translate(var(--tx-final), var(--ty-final));
                opacity: 0;
            }
        }

        /* Floating Color Clouds */
        .cloud {
            position: absolute;
            width: 250px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(50px);
            animation: floatCloud 20s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatCloud {
            0% { transform: translateX(-250px) scale(1); }
            50% { transform: translateX(calc(100vw + 250px)) scale(1.5); }
            100% { transform: translateX(-250px) scale(1); }
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            animation: floatHeart 7s infinite linear;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .subhead { font-size: 1.2rem; }
            .envelope-container { width: 400px; height: 280px; }
            .envelope-flap {
                border-left-width: 200px;
                border-right-width: 200px;
                border-top-width: 120px;
            }
            .letter { width: 350px; padding: 25px; }
            .letter textarea { min-height: 180px; }
            .letter-actions { flex-direction: column; gap: 10px; }
            .close-btn, .rewatch-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- Page 1: Simple Welcome Screen -->
    <div id="page1">
        <!-- Simple floating hearts background -->
        <div id="heartContainer"></div>
        
        <h1>A Colorful Message for You, My Love</h1>
        <p class="subhead">Someone special has something magical to say...</p>
        <button class="open-btn" id="surpriseBtn">Open Your Surprise 🌸</button>
    </div>

    <!-- Page 2: Envelope & Letter Experience -->
    <div id="page2">
        <div class="container">
            <!-- Floating Color Clouds -->
            <div class="cloud" style="top: 10%; left: -150px; background: #ffb6c1;"></div>
            <div class="cloud" style="top: 70%; right: -150px; background: #b6e1ff; animation-delay: -7s;"></div>
            <div class="cloud" style="top: 40%; left: 30%; background: #c1ffb6; animation-delay: -14s;"></div>
            
            <!-- Bigger Envelope -->
            <div class="envelope-container" id="envelopeContainer">
                <div class="envelope" id="envelope">
                    <div class="envelope-flap" id="envelopeFlap"></div>
                    <div class="envelope-body"></div>
                    <div class="seal">
                        <span style="font-size: 50px;">❤️</span>
                    </div>
                </div>
                <p class="hint-text">💌 Click to open your letter 💌</p>
            </div>

            <!-- Letter with Close and Rewatch Buttons -->
            <div class="letter" id="letter">
                <div class="letter-content">
                    <h2>My Dearest Love,</h2>
                    <textarea id="loveLetter" placeholder="Write your heartfelt feelings here...">Happy Holi my love! You color my world in ways I never knew possible. Every moment with you is like a festival of joy. Thank you for being the most beautiful part of my life. 

You're the pink in my skies, the blue in my dreams, and the gold in my heart. 🌸</textarea>
                    <div class="holi-greeting">Happy Holi, my love. 🌈❤️</div>
                    <div class="signature">Yours forever</div>
                    
                    <!-- Letter Action Buttons -->
                    <div class="letter-actions">
                        <button class="close-btn" id="closeLetterBtn">
                            <span>💕</span> Close Letter
                        </button>
                        <button class="rewatch-btn" id="rewatchBtn">
                            <span>🔄</span> Rewatch Magic
                        </button>
                    </div>
                </div>
            </div>

            <!-- Splash Container for Colors -->
            <div class="splash-container" id="splashContainer"></div>
        </div>
    </div>

    <script>
        // Create floating hearts for page 1
        function createFloatingHearts() {
            const heartContainer = document.getElementById('heartContainer');
            const colors = ['❤️', '🧡', '💛', '💚', '💙', '💜', '💖', '💝'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.innerHTML = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.fontSize = (Math.random() * 40 + 20) + 'px';
                    heart.style.animationDuration = (Math.random() * 6 + 5) + 's';
                    heart.style.animationDelay = Math.random() * 5 + 's';
                    heartContainer.appendChild(heart);
                }, i * 200);
            }
        }

        // Get elements
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const envelopeContainer = document.getElementById('envelopeContainer');
        const envelopeFlap = document.getElementById('envelopeFlap');
        const letter = document.getElementById('letter');
        const splashContainer = document.getElementById('splashContainer');
        const closeLetterBtn = document.getElementById('closeLetterBtn');
        const rewatchBtn = document.getElementById('rewatchBtn');
        
        let hasOpened = false;

        // Initialize floating hearts
        createFloatingHearts();

        // Page 1 to Page 2 transition
        surpriseBtn.addEventListener('click', () => {
            page1.classList.add('hidden');
            page2.classList.add('visible');
            
            // Create floating hearts after transition
            setInterval(createPage2Hearts, 500);
        });

        // Envelope click handler
        envelopeContainer.addEventListener('click', () => {
            if (hasOpened) return;
            
            hasOpened = true;
            
            // Open envelope flap
            envelopeFlap.classList.add('open');
            
            // Add opened class to envelope container
            envelopeContainer.classList.add('opened');
            
            // Show letter with delay
            setTimeout(() => {
                letter.classList.add('visible');
            }, 700);
            
            // Create color splash
            createColorSplash();
        });

        // Close letter button: hide letter, reset envelope, and return to first page
        closeLetterBtn.addEventListener('click', () => {
            // Hide the letter
            letter.classList.remove('visible');

            // Allow the hide animation to run, then reset state and show the first page
            setTimeout(() => {
                // Reset envelope state so user can re-open later
                hasOpened = false;
                envelopeFlap.classList.remove('open');
                envelopeContainer.classList.remove('opened');
                // Clear splash particles
                splashContainer.innerHTML = '';

                // Show page1 (first page) and hide page2
                page2.classList.remove('visible');
                page1.classList.remove('hidden');

                // Ensure viewport is at top
                window.scrollTo(0, 0);
            }, 300);
        });

        // Rewatch button (reset everything)
        rewatchBtn.addEventListener('click', () => {
            // Reset states
            hasOpened = false;
            envelopeFlap.classList.remove('open');
            envelopeContainer.classList.remove('opened');
            letter.classList.remove('visible');
            
            // Remove all splash particles
            splashContainer.innerHTML = '';
        });

        // Color splash function
        function createColorSplash() {
            const colors = ['#ff69b4', '#ffa500', '#ffff00', '#00ff00', '#1e90ff', '#9370db', '#ff4500', '#ff1493'];
            
            // First burst
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'splash-particle';
                    
                    const rect = envelopeContainer.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const angle = (i * 7.2) * Math.PI / 180;
                    const distance1 = 200 + Math.random() * 250;
                    const distance2 = 350 + Math.random() * 300;
                    const distance3 = 500 + Math.random() * 350;
                    
                    const tx = Math.cos(angle) * distance1;
                    const ty = Math.sin(angle) * distance1 - 80;
                    
                    const txMid = Math.cos(angle) * distance2;
                    const tyMid = Math.sin(angle) * distance2 - 120;
                    
                    const txFinal = Math.cos(angle) * distance3;
                    const tyFinal = Math.sin(angle) * distance3 - 150;
                    
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.setProperty('--tx-mid', txMid + 'px');
                    particle.style.setProperty('--ty-mid', tyMid + 'px');
                    particle.style.setProperty('--tx-final', txFinal + 'px');
                    particle.style.setProperty('--ty-final', tyFinal + 'px');
                    
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.width = Math.random() * 35 + 15 + 'px';
                    particle.style.height = particle.style.width;
                    
                    splashContainer.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.remove();
                    }, 2200);
                }, i * 20);
            }
            
            // Second burst
            setTimeout(() => {
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'splash-particle';
                    
                    const rect = envelopeContainer.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance1 = 150 + Math.random() * 200;
                    const distance2 = 300 + Math.random() * 250;
                    const distance3 = 450 + Math.random() * 300;
                    
                    const tx = Math.cos(angle) * distance1;
                    const ty = Math.sin(angle) * distance1;
                    
                    const txMid = Math.cos(angle) * distance2;
                    const tyMid = Math.sin(angle) * distance2;
                    
                    const txFinal = Math.cos(angle) * distance3;
                    const tyFinal = Math.sin(angle) * distance3;
                    
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.setProperty('--tx-mid', txMid + 'px');
                    particle.style.setProperty('--ty-mid', tyMid + 'px');
                    particle.style.setProperty('--tx-final', txFinal + 'px');
                    particle.style.setProperty('--ty-final', tyFinal + 'px');
                    
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.width = Math.random() * 25 + 10 + 'px';
                    particle.style.height = particle.style.width;
                    
                    splashContainer.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.remove();
                    }, 2200);
                }
            }, 400);
        }

        // Create floating hearts for page 2
        function createPage2Hearts() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '🧡', '💛', '💚', '💙', '💜', '💖'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 4 + 4 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Prevent multiple clicks on envelope
        document.addEventListener('click', (e) => {
            if (e.target.closest('.envelope-container') && hasOpened) {
                e.stopPropagation();
            }
        });
    </script>
</body>
</html>
